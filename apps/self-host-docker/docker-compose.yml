services:
  tekmemo-api:
    build:
      context: ../..
      dockerfile: apps/self-host-node/Dockerfile
    command: ["pnpm", "--filter", "@tekbreed/tekmemo-self-host-node", "server"]
    ports:
      - "8787:8787"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  tekmemo-worker:
    build:
      context: ../..
      dockerfile: apps/self-host-node/Dockerfile
    command: ["pnpm", "--filter", "@tekbreed/tekmemo-self-host-node", "worker"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tekmemo
      POSTGRES_PASSWORD: tekmemo
      POSTGRES_DB: tekmemo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tekmemo -d tekmemo"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tekmemo
      MINIO_ROOT_PASSWORD: tekmemo-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 tekmemo tekmemo-secret; do sleep 2; done &&
      mc mb --ignore-existing local/tekmemo &&
      mc anonymous set none local/tekmemo
      "

volumes:
  postgres_data:
  minio_data:
